<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - UniFriend</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4 auth-card" style="width: 400px;">

        <div class="text-center mb-4">
            <h3 class="fw-bold">Create Your Account</h3>
            <p class="text-muted">Join UniFriend and start connecting today</p>
        </div>

        <form>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your full name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">University</label>
                <input type="text" class="form-control" placeholder="Enter your university">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create a password">
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Confirm your password">
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </div>

            <div class="text-center">
                <small>
                    Already have an account?
                    <a href="login.html">Sign In</a>
                </small>
            </div>
        </form>

    </div>
</div>

</body>
</html>
