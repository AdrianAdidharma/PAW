<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - UniFriend</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-campus">

<div class="auth-card p-4">

    <h3 class="text-center mb-4 fw-bold">Login to UniFriend</h3>

    <form>

        <div class="mb-3 position-relative">
            <i class="bi bi-envelope-fill input-icon"></i>
            <input type="email" class="form-control ps-5" placeholder="Email" required>
        </div>

        <div class="mb-3 position-relative">
            <i class="bi bi-lock-fill input-icon"></i>
            <input type="password" class="form-control ps-5" id="loginPassword" placeholder="Password" required>
            <span class="toggle-password" onclick="togglePassword('loginPassword', this)">Show</span>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">
            Sign In
        </button>

    </form>

    <p class="text-center mt-3">
        Don't have an account?
        <a href="signup.html" class="text-white fw-bold">Sign Up</a>
    </p>

</div>

<script>
function togglePassword(id, element) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        element.textContent = "Hide";
    } else {
        input.type = "password";
        element.textContent = "Show";
    }
}
</script>

</body>
</html>
